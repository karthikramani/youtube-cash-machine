<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Cash Machine - Lead CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e5e7eb;
            padding: 20px;
        }
        
        .header {
            background: #141414;
            border: 2px solid #00d9ff;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #9ca3af;
            font-size: 1rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #141414;
            border: 2px solid #374151;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 2rem;
            color: #10b981;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #9ca3af;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #0891b2);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 217, 255, 0.3);
        }
        
        .btn-secondary {
            background: #1f2937;
            color: #e5e7eb;
            border: 2px solid #374151;
        }
        
        .btn-secondary:hover {
            border-color: #00d9ff;
        }
        
        .pipeline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .pipeline-stage {
            background: #141414;
            border: 2px solid #374151;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }
        
        .pipeline-stage h2 {
            font-size: 1.25rem;
            color: #00d9ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .pipeline-stage .count {
            background: #1f2937;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
        }
        
        .lead-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lead-card:hover {
            border-color: #00d9ff;
            transform: translateY(-2px);
        }
        
        .lead-card h3 {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .lead-card .email {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        
        .lead-card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .lead-card .follow-up {
            color: #fbbf24;
            font-weight: 600;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #141414;
            border: 2px solid #00d9ff;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #00d9ff;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .close-modal {
            background: #374151;
            color: #e5e7eb;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .email-preview {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .email-preview h3 {
            color: #10b981;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .pipeline {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 YouTube Cash Machine CRM</h1>
    <p>Manage leads, track pipeline, send follow-ups</p>
</div>

<div class="stats">
    <div class="stat-card">
        <h3 id="stat-total">0</h3>
        <p>Total Leads</p>
    </div>
    <div class="stat-card">
        <h3 id="stat-new">0</h3>
        <p>New</p>
    </div>
    <div class="stat-card">
        <h3 id="stat-qualified">0</h3>
        <p>Qualified</p>
    </div>
    <div class="stat-card">
        <h3 id="stat-closed">0</h3>
        <p>Closed</p>
    </div>
</div>

<div class="actions">
    <button class="btn btn-primary" onclick="openAddLeadModal()">+ Add Lead</button>
    <button class="btn btn-secondary" onclick="exportToCSV()">📊 Export CSV</button>
    <button class="btn btn-secondary" onclick="openSettingsModal()">⚙️ Settings</button>
    <button class="btn btn-secondary" onclick="syncConvertKit()">🔄 Sync ConvertKit</button>
</div>

<div class="pipeline">
    <div class="pipeline-stage">
        <h2>New <span class="count" id="count-new">0</span></h2>
        <div id="stage-new"></div>
    </div>
    
    <div class="pipeline-stage">
        <h2>Contacted <span class="count" id="count-contacted">0</span></h2>
        <div id="stage-contacted"></div>
    </div>
    
    <div class="pipeline-stage">
        <h2>Qualified <span class="count" id="count-qualified">0</span></h2>
        <div id="stage-qualified"></div>
    </div>
    
    <div class="pipeline-stage">
        <h2>Closed <span class="count" id="count-closed">0</span></h2>
        <div id="stage-closed"></div>
    </div>
</div>

<!-- Add Lead Modal -->
<div id="addLeadModal" class="modal">
    <div class="modal-content">
        <h2>Add New Lead</h2>
        <form id="addLeadForm" onsubmit="addLead(event)">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone">
            </div>
            <div class="form-group">
                <label>Source</label>
                <select name="source">
                    <option value="Website">Website</option>
                    <option value="Facebook Ad">Facebook Ad</option>
                    <option value="YouTube Ad">YouTube Ad</option>
                    <option value="Organic Social">Organic Social</option>
                    <option value="Referral">Referral</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes"></textarea>
            </div>
            <div class="form-group">
                <label>Follow-up Date</label>
                <input type="date" name="followup">
            </div>
            <button type="submit" class="btn btn-primary">Add Lead</button>
            <button type="button" class="close-modal" onclick="closeModal('addLeadModal')">Cancel</button>
        </form>
    </div>
</div>

<!-- Lead Detail Modal -->
<div id="leadDetailModal" class="modal">
    <div class="modal-content">
        <h2 id="leadDetailName"></h2>
        <div id="leadDetailContent"></div>
        <div style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="sendEmail()">📧 Send Email</button>
            <button class="btn btn-secondary" onclick="editLead()">✏️ Edit</button>
            <button class="btn btn-secondary" onclick="deleteLead()">🗑️ Delete</button>
            <button class="close-modal" onclick="closeModal('leadDetailModal')">Close</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>⚙️ Settings</h2>
        <form id="settingsForm" onsubmit="saveSettings(event)">
            <div class="form-group">
                <label>ConvertKit API Key</label>
                <input type="password" id="convertkit-api-key" placeholder="Your ConvertKit V4 API Key">
            </div>
            <div class="form-group">
                <label>SMTP Host (Optional)</label>
                <input type="text" id="smtp-host" placeholder="smtp.gmail.com">
            </div>
            <div class="form-group">
                <label>SMTP Username (Optional)</label>
                <input type="text" id="smtp-username" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>SMTP Password (Optional)</label>
                <input type="password" id="smtp-password">
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
            <button type="button" class="close-modal" onclick="closeModal('settingsModal')">Cancel</button>
        </form>
    </div>
</div>

<script>
// Data storage
let leads = JSON.parse(localStorage.getItem('crm-leads') || '[]');
let settings = JSON.parse(localStorage.getItem('crm-settings') || '{}');
let currentLeadId = null;

// Initialize
function init() {
    renderPipeline();
    updateStats();
    checkFollowUps();
    loadSettings();
}

// Add Lead
function addLead(event) {
    event.preventDefault();
    const form = event.target;
    const lead = {
        id: Date.now(),
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value || '',
        source: form.source.value,
        notes: form.notes.value || '',
        followup: form.followup.value || '',
        stage: 'new',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
    };
    
    leads.push(lead);
    saveLeads();
    renderPipeline();
    updateStats();
    closeModal('addLeadModal');
    form.reset();
    
    // Sync to ConvertKit if API key exists
    if (settings.convertkitApiKey) {
        syncLeadToConvertKit(lead);
    }
}

// Render Pipeline
function renderPipeline() {
    const stages = ['new', 'contacted', 'qualified', 'closed'];
    
    stages.forEach(stage => {
        const container = document.getElementById(`stage-${stage}`);
        const stageLeads = leads.filter(l => l.stage === stage);
        
        container.innerHTML = stageLeads.map(lead => `
            <div class="lead-card" onclick="openLeadDetail(${lead.id})" draggable="true" ondragstart="drag(event, ${lead.id})">
                <h3>${lead.name}</h3>
                <div class="email">${lead.email}</div>
                <div class="meta">
                    <span>${lead.source}</span>
                    ${lead.followup ? `<span class="follow-up">📅 ${formatDate(lead.followup)}</span>` : ''}
                </div>
            </div>
        `).join('');
        
        document.getElementById(`count-${stage}`).textContent = stageLeads.length;
    });
    
    // Enable drop zones
    stages.forEach(stage => {
        const container = document.getElementById(`stage-${stage}`);
        container.ondragover = (e) => e.preventDefault();
        container.ondrop = (e) => drop(e, stage);
    });
}

// Drag and Drop
function drag(event, leadId) {
    event.dataTransfer.setData('leadId', leadId);
}

function drop(event, newStage) {
    event.preventDefault();
    const leadId = parseInt(event.dataTransfer.getData('leadId'));
    const lead = leads.find(l => l.id === leadId);
    if (lead) {
        lead.stage = newStage;
        lead.updatedAt = new Date().toISOString();
        saveLeads();
        renderPipeline();
        updateStats();
    }
}

// Update Stats
function updateStats() {
    document.getElementById('stat-total').textContent = leads.length;
    document.getElementById('stat-new').textContent = leads.filter(l => l.stage === 'new').length;
    document.getElementById('stat-qualified').textContent = leads.filter(l => l.stage === 'qualified').length;
    document.getElementById('stat-closed').textContent = leads.filter(l => l.stage === 'closed').length;
}

// Open Lead Detail
function openLeadDetail(leadId) {
    currentLeadId = leadId;
    const lead = leads.find(l => l.id === leadId);
    if (!lead) return;
    
    document.getElementById('leadDetailName').textContent = lead.name;
    document.getElementById('leadDetailContent').innerHTML = `
        <div class="form-group">
            <label>Email</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px;">${lead.email}</div>
        </div>
        ${lead.phone ? `
        <div class="form-group">
            <label>Phone</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px;">${lead.phone}</div>
        </div>
        ` : ''}
        <div class="form-group">
            <label>Source</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px;">${lead.source}</div>
        </div>
        <div class="form-group">
            <label>Stage</label>
            <select id="lead-stage" onchange="updateLeadStage(${leadId})" style="padding: 10px; background: #1f2937; border: 2px solid #374151; border-radius: 8px; color: #e5e7eb; width: 100%;">
                <option value="new" ${lead.stage === 'new' ? 'selected' : ''}>New</option>
                <option value="contacted" ${lead.stage === 'contacted' ? 'selected' : ''}>Contacted</option>
                <option value="qualified" ${lead.stage === 'qualified' ? 'selected' : ''}>Qualified</option>
                <option value="closed" ${lead.stage === 'closed' ? 'selected' : ''}>Closed</option>
            </select>
        </div>
        ${lead.notes ? `
        <div class="form-group">
            <label>Notes</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px; white-space: pre-wrap;">${lead.notes}</div>
        </div>
        ` : ''}
        ${lead.followup ? `
        <div class="form-group">
            <label>Follow-up Date</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px;">${formatDate(lead.followup)}</div>
        </div>
        ` : ''}
        <div class="form-group">
            <label>Created</label>
            <div style="padding: 10px; background: #1f2937; border-radius: 8px; font-size: 0.875rem; color: #9ca3af;">${formatDateTime(lead.createdAt)}</div>
        </div>
    `;
    
    openModal('leadDetailModal');
}

// Update Lead Stage
function updateLeadStage(leadId) {
    const lead = leads.find(l => l.id === leadId);
    const newStage = document.getElementById('lead-stage').value;
    if (lead) {
        lead.stage = newStage;
        lead.updatedAt = new Date().toISOString();
        saveLeads();
        renderPipeline();
        updateStats();
    }
}

// Send Email
function sendEmail() {
    const lead = leads.find(l => l.id === currentLeadId);
    if (!lead) return;
    
    if (settings.convertkitApiKey) {
        // Use ConvertKit
        alert(`Sending email to ${lead.email} via ConvertKit...\n\nNote: You'll need to create a broadcast in ConvertKit and tag this subscriber.`);
    } else if (settings.smtpHost) {
        // Use SMTP
        alert(`SMTP email would be sent to: ${lead.email}\n\n(Backend integration required)`);
    } else {
        // Open email client
        window.location.href = `mailto:${lead.email}?subject=YouTube Cash Machine Follow-up&body=Hi ${lead.name},%0D%0A%0D%0AI wanted to follow up about YouTube Cash Machine...`;
    }
}

// Export to CSV
function exportToCSV() {
    const csv = [
        ['Name', 'Email', 'Phone', 'Source', 'Stage', 'Follow-up', 'Created', 'Notes'],
        ...leads.map(l => [
            l.name,
            l.email,
            l.phone || '',
            l.source,
            l.stage,
            l.followup || '',
            formatDateTime(l.createdAt),
            (l.notes || '').replace(/,/g, ';')
        ])
    ].map(row => row.join(',')).join('\n');
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `youtube-cash-machine-leads-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
}

// ConvertKit Sync
function syncLeadToConvertKit(lead) {
    if (!settings.convertkitApiKey) return;
    
    fetch('https://api.kit.com/v4/subscribers', {
        method: 'POST',
        headers: {
            'X-Kit-Api-Key': settings.convertkitApiKey,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            email_address: lead.email,
            first_name: lead.name.split(' ')[0],
            fields: {
                source: lead.source,
                stage: lead.stage
            }
        })
    })
    .then(res => res.json())
    .then(data => console.log('Synced to ConvertKit:', data))
    .catch(err => console.error('ConvertKit sync error:', err));
}

function syncConvertKit() {
    if (!settings.convertkitApiKey) {
        alert('Please add your ConvertKit API key in Settings first.');
        return;
    }
    
    let synced = 0;
    leads.forEach(lead => {
        syncLeadToConvertKit(lead);
        synced++;
    });
    
    alert(`Syncing ${synced} leads to ConvertKit...`);
}

// Settings
function openSettingsModal() {
    document.getElementById('convertkit-api-key').value = settings.convertkitApiKey || '';
    document.getElementById('smtp-host').value = settings.smtpHost || '';
    document.getElementById('smtp-username').value = settings.smtpUsername || '';
    document.getElementById('smtp-password').value = settings.smtpPassword || '';
    openModal('settingsModal');
}

function saveSettings(event) {
    event.preventDefault();
    settings = {
        convertkitApiKey: document.getElementById('convertkit-api-key').value,
        smtpHost: document.getElementById('smtp-host').value,
        smtpUsername: document.getElementById('smtp-username').value,
        smtpPassword: document.getElementById('smtp-password').value
    };
    localStorage.setItem('crm-settings', JSON.stringify(settings));
    closeModal('settingsModal');
    alert('Settings saved!');
}

function loadSettings() {
    // Settings already loaded from localStorage
}

// Follow-up Reminders
function checkFollowUps() {
    const today = new Date().toISOString().split('T')[0];
    const dueLeads = leads.filter(l => l.followup === today && l.stage !== 'closed');
    
    if (dueLeads.length > 0) {
        setTimeout(() => {
            alert(`📅 You have ${dueLeads.length} follow-up(s) due today:\n\n${dueLeads.map(l => `• ${l.name} (${l.email})`).join('\n')}`);
        }, 1000);
    }
}

// Utility Functions
function saveLeads() {
    localStorage.setItem('crm-leads', JSON.stringify(leads));
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateTime(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
    });
}

function openModal(modalId) {
    document.getElementById(modalId).classList.add('active');
}

function closeModal(modalId) {
    document.getElementById(modalId).classList.remove('active');
}

function openAddLeadModal() {
    openModal('addLeadModal');
}

function editLead() {
    alert('Edit functionality coming soon! For now, use the stage dropdown to update pipeline position.');
}

function deleteLead() {
    if (confirm('Delete this lead?')) {
        leads = leads.filter(l => l.id !== currentLeadId);
        saveLeads();
        renderPipeline();
        updateStats();
        closeModal('leadDetailModal');
    }
}

// Initialize on load
init();
</script>

</body>
</html>
